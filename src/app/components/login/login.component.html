<div class="wrapper">
  <div *ngIf="!loading" class="body">
    <img class="logo" src="assets/images/login.png" alt="Login" title="Login">
    <h1>Login</h1>

    <form (ngSubmit)="login()" [formGroup]="loginUser">
      <div class="form-floating mb-3">
        <input type="email" formControlName="email" class="form-control" placeholder="name@example.com">
        <label>Correo</label>

        <span *ngIf="loginUser.get('email')?.hasError('required') && loginUser.get('email')?.touched" class="text-danger errorLabel">
          El <strong>correo</strong> es requerido
        </span>

        <span *ngIf="loginUser.get('email')?.hasError('email') && loginUser.get('email')?.touched" class="text-danger errorLabel">
          El <strong>correo</strong> es invalido
        </span>
      </div>

      <div class="form-floating mb-3">
        <input type="password" formControlName="password" class="form-control" placeholder="Contraseña">
        <label>Contraseña</label>

        <span *ngIf="loginUser.get('password')?.hasError('required') && loginUser.get('password')?.touched" class="text-danger errorLabel">
          La <strong>contraseña</strong> es requerida
        </span>

        <span *ngIf="loginUser.get('password')?.hasError('minlength') && loginUser.get('password')?.touched" class="text-danger errorLabel">
          El <strong>contraseña</strong> debe tener 6 caracteres
        </span>
      </div>

      <div class="d-grid gap-2">
        <button type="submit" class="btn btn-primary btn-lg" [disabled]="loginUser.invalid" >Ingresar</button>
      </div>
      <p class="mt-3">No tienes cuenta? <a [routerLink]="['/registrar']">Crear Cuenta</a></p>
      <a class="mt-3" [routerLink]="['/recuperar-contraseña']">Recuperar Contraseña</a>
    </form>
  </div>

  <app-shared-loading *ngIf="loading"></app-shared-loading>
</div>
